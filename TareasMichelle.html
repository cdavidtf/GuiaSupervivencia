<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPastel - Mi Gestor</title>
    <!-- Cargamos las herramientas necesarias directamente desde la web -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #F3E8FF; color: #4A3B5D; font-family: sans-serif; overflow-x: hidden; }
        .pastel-card { background: white; border-radius: 24px; border: 1px solid #E9D5FF; transition: all 0.3s ease; }
        .pastel-card:hover { transform: translateY(-2px); shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .active-tab { background-color: #F3E8FF; color: #9333EA; font-weight: 600; }
        .sidebar { transition: all 0.3s ease; }
        /* Animaciones suaves */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-24 md:pb-0">

    <!-- Contenido Principal -->
    <div id="app" class="max-w-5xl mx-auto px-6 pt-12 md:ml-64 min-h-screen">
        <!-- El contenido se inyecta aquí con JS -->
    </div>

    <!-- Navegación Lateral (Desktop) y Inferior (Móvil) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#E9D5FF] px-4 py-3 flex justify-around md:top-0 md:flex-col md:w-64 md:h-full md:justify-start md:pt-10 md:gap-4 shadow-sm z-40">
        <div class="hidden md:flex items-center gap-3 mb-10 text-[#9333EA] px-4">
            <div class="bg-[#D8B4FE] p-2 rounded-lg shadow-sm">
                <i class="fas fa-check-circle text-white text-xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">TaskPastel</h1>
        </div>
        
        <button onclick="changeView('inicio')" id="btn-inicio" class="flex flex-col md:flex-row items-center gap-2 p-3 rounded-xl w-full justify-center md:justify-start active-tab">
            <i class="fas fa-th-large text-lg"></i> <span class="text-[10px] md:text-base">Inicio</span>
        </button>
        
        <button onclick="changeView('tareas')" id="btn-tareas" class="flex flex-col md:flex-row items-center gap-2 p-3 rounded-xl w-full justify-center md:justify-start text-gray-400 hover:bg-gray-50">
            <i class="fas fa-list-ul text-lg"></i> <span class="text-[10px] md:text-base">Tareas</span>
        </button>
        
        <button onclick="changeView('completadas')" id="btn-completadas" class="flex flex-col md:flex-row items-center gap-2 p-3 rounded-xl w-full justify-center md:justify-start text-gray-400 hover:bg-gray-50">
            <i class="fas fa-history text-lg"></i> <span class="text-[10px] md:text-base">Realizadas</span>
        </button>
    </nav>

    <!-- Botón Flotante para añadir -->
    <button onclick="openModal()" class="fixed bottom-20 right-6 md:bottom-10 md:right-10 bg-[#9333EA] text-white w-14 h-14 rounded-2xl shadow-lg shadow-purple-200 flex items-center justify-center hover:scale-110 transition-transform z-50">
        <i class="fas fa-plus text-xl"></i>
    </button>

    <!-- Modal para Nueva Tarea -->
    <div id="modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[32px] overflow-hidden shadow-2xl scale-in">
            <div class="bg-[#FAF5FF] p-6 border-b border-[#F3E8FF]">
                <h3 class="text-xl font-bold text-[#4A3B5D]">Nueva Tarea</h3>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Título</label>
                    <input type="text" id="taskTitle" placeholder="Ej: Proyecto de Ciencias" class="w-full bg-[#F3E8FF]/30 border border-[#E9D5FF] rounded-2xl p-4 mt-1 focus:outline-none focus:ring-2 focus:ring-[#D8B4FE]">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase ml-1">Fecha</label>
                        <input type="date" id="taskDate" class="w-full bg-[#F3E8FF]/30 border border-[#E9D5FF] rounded-2xl p-4 mt-1 focus:outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase ml-1">Hora</label>
                        <input type="time" id="taskTime" class="w-full bg-[#F3E8FF]/30 border border-[#E9D5FF] rounded-2xl p-4 mt-1 focus:outline-none">
                    </div>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-4 text-gray-500 font-bold hover:bg-gray-50 rounded-2xl">Cancelar</button>
                    <button onclick="saveTask()" class="flex-1 py-4 bg-[#9333EA] text-white rounded-2xl font-bold shadow-lg shadow-purple-100">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sistema de datos
        let tasks = JSON.parse(localStorage.getItem('pastel_tasks_v3')) || [];
        let currentView = 'inicio';

        // Función para renderizar la interfaz
        function render() {
            const app = document.getElementById('app');
            const today = new Date().toISOString().split('T')[0];
            
            // Actualizar estilo de botones de navegación
            ['inicio', 'tareas', 'completadas'].forEach(v => {
                const btn = document.getElementById(`btn-${v}`);
                if(currentView === v) {
                    btn.classList.add('active-tab');
                    btn.classList.remove('text-gray-400');
                } else {
                    btn.classList.remove('active-tab');
                    btn.classList.add('text-gray-400');
                }
            });

            if (currentView === 'inicio') {
                const todayTasks = tasks.filter(t => t.date === today && !t.completed)
                                        .sort((a,b) => a.time.localeCompare(b.time));
                const pendingCount = tasks.filter(t => !t.completed).length;

                app.innerHTML = `
                    <div class="fade-in">
                        <header class="mb-8">
                            <h2 class="text-3xl font-extrabold">¡Hola! ✨</h2>
                            <p class="text-[#9333EA] font-medium">Tienes ${pendingCount} tareas pendientes en total.</p>
                        </header>

                        <div class="pastel-card p-7 shadow-sm mb-8">
                            <div class="flex items-center gap-3 mb-6">
                                <i class="fas fa-calendar-day text-[#9333EA] text-lg"></i>
                                <h3 class="font-bold text-lg">Tu agenda para hoy</h3>
                            </div>
                            
                            <div class="space-y-4">
                                ${todayTasks.length ? todayTasks.map(t => `
                                    <div class="flex items-center gap-4 p-4 rounded-2xl bg-[#FAF5FF] border border-[#F3E8FF]">
                                        <div class="bg-white px-3 py-2 rounded-xl shadow-sm text-[10px] font-bold text-[#9333EA]">${t.time}</div>
                                        <div class="flex-1 font-bold text-[#4A3B5D]">${t.title}</div>
                                        <button onclick="toggleTask(${t.id})" class="text-[#D8B4FE] hover:text-[#9333EA] transition-colors">
                                            <i class="far fa-circle text-2xl"></i>
                                        </button>
                                    </div>
                                `).join('') : `
                                    <div class="text-center py-8">
                                        <div class="bg-[#FAF5FF] w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3">
                                            <i class="fas fa-coffee text-[#D8B4FE]"></i>
                                        </div>
                                        <p class="text-gray-400 text-sm">No hay nada urgente para hoy.</p>
                                    </div>
                                `}
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-gradient-to-br from-[#E9D5FF] to-[#D8B4FE] p-6 rounded-[32px] text-white shadow-lg shadow-purple-100">
                                <h4 class="font-bold text-lg">Tu progreso</h4>
                                <div class="mt-4 bg-white/20 h-2.5 rounded-full overflow-hidden">
                                    <div class="bg-white h-full" style="width: ${tasks.length ? (tasks.filter(t=>t.completed).length / tasks.length)*100 : 0}%"></div>
                                </div>
                                <p class="text-[10px] mt-2 opacity-80 text-right font-bold uppercase tracking-wider">
                                    ${tasks.filter(t=>t.completed).length} de ${tasks.length} completadas
                                </p>
                            </div>
                            <div onclick="openModal()" class="pastel-card p-6 border-2 border-dashed border-[#D8B4FE] flex items-center justify-center gap-3 cursor-pointer hover:bg-[#FAF5FF]">
                                <i class="fas fa-plus-circle text-[#9333EA] text-xl"></i>
                                <span class="font-bold text-[#9333EA]">Crear nueva tarea</span>
                            </div>
                        </div>
                    </div>
                `;
            } else if (currentView === 'tareas') {
                const pending = tasks.filter(t => !t.completed).sort((a,b) => new Date(a.date) - new Date(b.date));
                app.innerHTML = `
                    <div class="fade-in">
                        <h2 class="text-3xl font-extrabold mb-2">Pendientes</h2>
                        <p class="text-gray-500 mb-8 font-medium">Organiza tus próximos pasos.</p>
                        <div class="grid gap-4">
                            ${pending.length ? pending.map(t => `
                                <div class="pastel-card p-5 flex items-center gap-5">
                                    <button onclick="toggleTask(${t.id})" class="text-[#D8B4FE] hover:text-[#9333EA]">
                                        <i class="far fa-circle text-2xl"></i>
                                    </button>
                                    <div class="flex-1">
                                        <div class="font-bold text-lg text-[#4A3B5D]">${t.title}</div>
                                        <div class="flex gap-4 mt-1">
                                            <span class="text-[10px] font-bold text-gray-400 uppercase"><i class="far fa-calendar mr-1"></i> ${t.date}</span>
                                            <span class="text-[10px] font-bold text-gray-400 uppercase"><i class="far fa-clock mr-1"></i> ${t.time}</span>
                                        </div>
                                    </div>
                                    <button onclick="deleteTask(${t.id})" class="text-gray-200 hover:text-red-400 transition-colors px-2"><i class="fas fa-trash"></i></button>
                                </div>
                            `).join('') : '<div class="text-center py-20 text-gray-400 font-medium">¡Lista vacía! Agrega algo nuevo.</div>'}
                        </div>
                    </div>
                `;
            } else {
                const done = tasks.filter(t => t.completed).sort((a,b) => new Date(b.id) - new Date(a.id));
                app.innerHTML = `
                    <div class="fade-in">
                        <h2 class="text-3xl font-extrabold mb-2">Realizadas</h2>
                        <p class="text-gray-500 mb-8 font-medium">Todo lo que has logrado.</p>
                        <div class="grid gap-4">
                            ${done.length ? done.map(t => `
                                <div class="pastel-card p-5 flex items-center gap-5 opacity-70 bg-white/50">
                                    <button onclick="toggleTask(${t.id})" class="text-green-500">
                                        <i class="fas fa-check-circle text-2xl"></i>
                                    </button>
                                    <div class="flex-1">
                                        <div class="font-bold text-lg text-gray-400 line-through">${t.title}</div>
                                        <div class="text-[10px] font-bold text-gray-300 uppercase italic">Completada</div>
                                    </div>
                                    <button onclick="deleteTask(${t.id})" class="text-gray-300 hover:text-red-400"><i class="fas fa-trash"></i></button>
                                </div>
                            `).join('') : '<div class="text-center py-20 text-gray-300">Aún no hay tareas en el historial.</div>'}
                        </div>
                    </div>
                `;
            }
        }

        // Funciones de Control
        function changeView(v) { currentView = v; render(); }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function saveTask() {
            const title = document.getElementById('taskTitle').value;
            const date = document.getElementById('taskDate').value || new Date().toISOString().split('T')[0];
            const time = document.getElementById('taskTime').value || "12:00";
            if(!title.trim()) return;
            
            tasks.push({ id: Date.now(), title, date, time, completed: false });
            localStorage.setItem('pastel_tasks_v3', JSON.stringify(tasks));
            
            document.getElementById('taskTitle').value = '';
            closeModal();
            render();
        }

        function toggleTask(id) {
            tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
            localStorage.setItem('pastel_tasks_v3', JSON.stringify(tasks));
            render();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('pastel_tasks_v3', JSON.stringify(tasks));
            render();
        }

        // Carga inicial
        window.onload = render;
    </script>
</body>
</html>
